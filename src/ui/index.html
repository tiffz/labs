<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <!-- Critical CSS: paints the app background during HTML parse so there is no FOUC. -->
    <style>html{color-scheme:light;background:#eef4ff;color:#221b3a}</style>
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>UI Catalog - Tiff Zhang Labs</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon.svg" />
    <link rel="stylesheet" href="/styles/shared.css" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="Shared UI component catalog with live demos and usage documentation."
    />

    <script>
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        const script = document.createElement('script');
        script.async = true;
        script.src = '/scripts/analytics.js';
        document.head.appendChild(script);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/ui/main.tsx"></script>
  </body>
</html>
