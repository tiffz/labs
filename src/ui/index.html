<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>UI Catalog (Internal) - Tiff Zhang Labs</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="Shared UI component catalog with live demos and usage documentation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=optional"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    />
    <script>
      if ('fonts' in document) {
        document.fonts
          .load('24px "Material Symbols Outlined"')
          .then(() => document.documentElement.classList.add('fonts-loaded'))
          .catch(() => document.documentElement.classList.add('fonts-loaded'));
      } else {
        window.addEventListener('load', () => document.documentElement.classList.add('fonts-loaded'));
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/ui/main.tsx"></script>
  </body>
</html>
