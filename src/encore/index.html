<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <link rel="icon" type="image/png" href="/icons/favicon-encore.png?v=1" />
    <link rel="apple-touch-icon" href="/icons/favicon-encore.png?v=1" />
    <meta name="theme-color" content="#c026d3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Guest share is #/share/<driveFileId> (fragment not sent to server). Inline guard so noindex
      is present before the JS bundle; keep the regex in sync with src/encore/seo/guestShareRobots.ts.
    -->
    <script>
      (function () {
        try {
          var h = window.location.hash || '';
          if (!/^#\/share\/[^/?#]+$/.test(h)) return;
          if (document.getElementById('encore-guest-share-robots')) return;
          var m = document.createElement('meta');
          m.id = 'encore-guest-share-robots';
          m.setAttribute('name', 'robots');
          m.setAttribute('content', 'noindex, nofollow, noarchive, nosnippet');
          document.head.appendChild(m);
        } catch (e) {}
      })();
    </script>
    <meta name="color-scheme" content="light" />
    <style>html{color-scheme:light;background:#fbf7fb;color:#4c1d95}</style>
    <meta name="description" content="Track musical repertoire, practice journals, and performance history. Local-first with optional Google Drive sync." />
    <title>Encore - Tiff Zhang Labs</title>
    <link rel="canonical" href="https://labs.tiffzhang.com/encore/" />
    <meta property="og:title" content="Encore - Tiff Zhang Labs" />
    <meta property="og:description" content="Personal repertoire companion with local-first storage and Google Drive backup." />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tiff Zhang Labs" />
    <meta name="twitter:card" content="summary" />

    <meta name="twitter:description" content="Personal repertoire companion with local-first storage and Google Drive backup." />
    <link rel="stylesheet" href="/styles/labs-cookie-consent.css" />
    <style>:root { --labs-cc-accent: #c026d3; --labs-cc-on-accent: #ffffff; }</style>
    <script defer src="/scripts/labs-cookie-consent.js"></script>
    <link rel="stylesheet" href="/styles/shared.css" />
  </head>

    <script type="module" src="/encore/main.tsx"></script>
  </body>
</html>
