    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a darbuka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A darbuka (also spelled doumbek or tabla) is a goblet-shaped hand drum used across the Middle East, North Africa, and Central Asia. It produces three main sounds: dum (a deep bass tone from the center), tek (a sharp rim strike), and ka (a quieter rim tap). These sounds combine into rhythmic patterns like Maqsum, Baladi, and Ayoub that form the backbone of Arabic, Turkish, and Persian music."
          }
        },
        {
          "@type": "Question",
          "name": "What is Maqsum rhythm?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Maqsum is one of the most common rhythms in Middle Eastern music. It's a 4/4 pattern with the sequence D-T-__T-D---T--- (dum, tek, rest, tek, dum, rest, tek, rest). It forms the rhythmic foundation for much of Egyptian and Lebanese popular music and belly dance."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between Maqsum and Baladi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Both are 4/4 rhythms, but Baladi starts with two consecutive dum strokes (D-D-__T-D---T---) while Maqsum starts with dum-tek (D-T-__T-D---T---). Baladi has an earthier, more grounded feel and is closely associated with Egyptian folk music and belly dance, while Maqsum is lighter and more versatile."
          }
        }
      ]
    }
    </script>

        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Baladi",
          "description": "A core Egyptian 4/4 rhythm that starts with two dum strokes. Has an earthy, grounded feel closely associated with Egyptian folk music.",
          "url": "https://labs.tiffzhang.com/drums/?rhythm=D-D-__T-D---T---"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Saeidi",
          "description": "An energetic 4/4 rhythm with two consecutive dum strokes in the second half of the measure.",
          "url": "https://labs.tiffzhang.com/drums/?rhythm=D-T-__D-D---T---"
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Ayoub",
          "description": "An energetic 2/4 rhythm often used in faster dance music and zar ceremonies.",

        }
      ]
    }
    </script>
    
    <!-- Fallback font metrics (Roboto from @fontsource in appFonts.ts) -->

        /* Create fallback fonts that match Roboto's metrics and weight */
        /* Use system fonts that are closer to Roboto's weight */
        @font-face {
            font-family: 'Roboto Fallback';
            src: local('Segoe UI'), local('Helvetica Neue'), local('Arial');
            size-adjust: 100.06%;
            ascent-override: 92.77%;
            descent-override: 24.41%;

        /* Apply fallback with Roboto in font stack */

            font-family: 'Roboto', 'Roboto Fallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;

        /* Add subtle text rendering to increase perceived weight without layout shift */

            /* Slightly bolder rendering on fallback fonts */

            -moz-osx-font-smoothing: grayscale;

        }
        
        /* Ensure headings have proper weight */

            /* Extra boldness for headings */
