<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light" />
    <!-- Critical CSS: paints the app background during HTML parse so there is no FOUC. -->
    <style>html{color-scheme:light;background:#faf5ff;color:#1f2937}</style>
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Universal Tom Importer - Tiff Zhang Labs</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-drums.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon-drums.svg" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Import Universal Tom rhythms to Darbuka Trainer" />

    <link rel="stylesheet" href="/styles/shared.css" />

    <style>
        @font-face {
            font-family: 'Roboto Fallback';
            src: local('Segoe UI'), local('Helvetica Neue'), local('Arial');
            size-adjust: 100.06%;
            ascent-override: 92.77%;
            descent-override: 24.41%;
            line-gap-override: 0%;
        }
        body {
            font-family: 'Roboto', 'Roboto Fallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
        }
        body, button, input, select, textarea {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
    </style>

    <script>
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        const script = document.createElement('script');
        script.async = true;
        script.src = '/scripts/analytics.js';
        document.head.appendChild(script);
      }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
