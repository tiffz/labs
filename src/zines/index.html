<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light" />
    <!-- Critical CSS: paints the app background during HTML parse so there is no FOUC. -->
    <style>html{color-scheme:light;background:#fef6eb;color:#44403c}</style>
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Zine Studio - Tiff Zhang Labs</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-zines.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon-zines.svg" />
    <link rel="stylesheet" href="/styles/shared.css" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Format image files into printable zines — supports minizine and booklet layouts" />
    <link rel="canonical" href="https://labs.tiffzhang.com/zines/" />
    <meta property="og:title" content="Zine Studio - Tiff Zhang Labs" />
    <meta property="og:description" content="Format image files into printable zines — supports minizine and booklet layouts" />
    <meta property="og:url" content="https://labs.tiffzhang.com/zines/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tiff Zhang Labs" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Zine Studio - Tiff Zhang Labs" />
    <meta name="twitter:description" content="Format image files into printable zines — supports minizine and booklet layouts" />
    <!-- Caveat + Inter from @fontsource (see shared/ui/fonts/appFonts.ts) -->
    <style>
        
        /* Font variables with strong fallbacks */
        :root {
            --font-heading: 'Caveat', 'Brush Script MT', 'Lucida Handwriting', cursive;
            --font-body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Immediate font application to prevent flash */
        body {
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        .font-heading {
            font-family: var(--font-heading);
        }
        
        /* Hide body until fonts/icons are ready to prevent FOUC.
           `initMaterialIconRuntime()` (main.tsx) adds `fonts-loaded` on <html>, same as other apps. */
        body {
            visibility: hidden;
        }

        html.fonts-loaded body {
            visibility: visible;
        }
    </style>
    
    <!-- StPageFlip library for realistic page turning -->
    <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    
    <!-- Font loading detection script -->
    <link rel="stylesheet" href="/styles/labs-cookie-consent.css" />
    <style>:root { --labs-cc-accent: #f97316; --labs-cc-on-accent: #ffffff; }</style>
    <script defer src="/scripts/labs-cookie-consent.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
