<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark" />
    <!-- Critical CSS: paints the app background during HTML parse so there is no FOUC. -->
    <style>html{color-scheme:dark;background:#16161e;color:#e8e6f0}</style>
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Find the Beat - Tiff Zhang Labs</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-beat.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon-beat.svg" />
    <link rel="stylesheet" href="/styles/shared.css" />
    <meta name="theme-color" content="#1e1e28" />
    <meta name="description" content="Analyze music to find the beat — automatic BPM detection and visual beat guidance" />
    <link rel="canonical" href="https://labs.tiffzhang.com/beat/" />
    <meta property="og:title" content="Find the Beat - Tiff Zhang Labs" />
    <meta property="og:description" content="Analyze music to find the beat — automatic BPM detection and visual beat guidance" />
    <meta property="og:url" content="https://labs.tiffzhang.com/beat/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tiff Zhang Labs" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Find the Beat - Tiff Zhang Labs" />
    <meta name="twitter:description" content="Analyze music to find the beat — automatic BPM detection and visual beat guidance" />
    
    <style>
        @font-face {
            font-family: 'Roboto Fallback';
            src: local('Segoe UI'), local('Helvetica Neue'), local('Arial');
            size-adjust: 100.06%;
            ascent-override: 92.77%;
            descent-override: 24.41%;
            line-gap-override: 0%;
        }
        
        body {
            font-family: 'Roboto', 'Roboto Fallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
        }
    </style>
    
    <!-- Analytics - Only load in production -->
    <script>
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            const script = document.createElement('script');
            script.async = true;
            script.src = '/scripts/analytics.js';
            document.head.appendChild(script);
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
