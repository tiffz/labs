<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Critical CSS: paints the app background during HTML parse so there is no FOUC
         before the theme stylesheet loads. Keep small. Must match the app's body
         background/color in its theme stylesheet. -->
    <style>html{color-scheme:dark;background:#0a0a0a;color:#e8e8e8}</style>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-count.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon-count.svg" />
    <meta name="description" content="Free online metronome that counts out loud. Practice 3+3+2 rhythms, odd meters like 7/8 and 5/8, subdivisions, and swing feel with spoken beat numbers. Supports 1-e-+-a and Takadimi counting." />
    <meta name="keywords" content="vocal counting metronome, online metronome with voice, 3-3-2 rhythm practice tool, metronome with subdivisions, odd time signature metronome, Takadimi metronome, counting metronome online, rhythm practice tool" />
    <title>Count Me In: A Metronome That Counts Out Loud</title>
    <link rel="canonical" href="https://labs.tiffzhang.com/count/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Count Me In: A Metronome That Counts Out Loud" />
    <meta property="og:description" content="Free online metronome that counts out loud. Practice 3+3+2 rhythms, 7/8, 5/8, swing, and more with spoken counting, click, and drum sounds." />
    <meta property="og:url" content="https://labs.tiffzhang.com/count/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tiff Zhang Labs" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Count Me In: Vocal Counting Metronome" />
    <meta name="twitter:description" content="A metronome that counts out loud. Practice 3+3+2, odd meters, swing, and Takadimi with spoken beat counting." />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Count Me In",
      "description": "A free online metronome that counts out loud. Practice asymmetric rhythms (3+3+2, 7/8, 5/8), subdivisions, and swing feel with spoken beat numbers, click tracks, and drum sounds.",
      "url": "https://labs.tiffzhang.com/count/",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any (Web Browser)",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Spoken beat counting with voice synthesis",
        "3+3+2 and custom beat groupings for compound and asymmetric meters",
        "Subdivision levels: quarter, eighth, triplet, sixteenth, swing",
        "Two counting systems: standard (1 e + a) and Takadimi",
        "Per-beat muting and subdivision mixer",
        "Click track and drum sounds",
        "Song profiles for saving metronome presets",
        "Shareable URL with full configuration state"
      ],
      "author": {
        "@type": "Person",
        "name": "Tiff Zhang",
        "url": "https://labs.tiffzhang.com"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage (AEO for rhythm practice queries) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a vocal counting metronome?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A vocal counting metronome speaks beat numbers out loud instead of just clicking. Count Me In uses synthesized voice samples so you can hear '1, 2, 3, 4' (or Takadimi syllables) while you play, helping you internalize the rhythm without watching a screen."
          }
        },
        {
          "@type": "Question",
          "name": "What is the 3+3+2 rhythm pattern?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The 3+3+2 pattern divides 8 eighth notes into groups of 3, 3, and 2. It goes by many names depending on the tradition: tresillo in Afro-Cuban and Latin music, habanera in the 19th-century Cuban dance that spread worldwide, and it forms the first half of the son clave. The pattern has sub-Saharan African origins and you'll also hear it in funk, hip-hop, reggaeton, and pop music. In Count Me In, set the time signature to 8/8 and enter 3+3+2 as the beat grouping to practice it with vocal counting."
          }
        },
        {
          "@type": "Question",
          "name": "How do I practice odd time signatures like 7/8 or 5/8?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Set the time signature to 7/8 or 5/8 in Count Me In, then choose a beat grouping (for example, 2+2+3 or 3+2+2 for 7/8, or 3+2 or 2+3 for 5/8). Turn on voice counting so you can hear which beat you're on. Start at a slow tempo and increase as you get comfortable with where the accents fall."
          }
        }
      ]
    }
    </script>

    <link rel="stylesheet" href="/styles/shared.css" />
    <link rel="stylesheet" href="/styles/labs-cookie-consent.css" />
    <!-- Match pulse theme primary (see getAppTheme('pulse') in shared/ui/theme/appTheme.ts). -->
    <style>:root { --labs-cc-accent: #00ff41; --labs-cc-on-accent: #0a0a0a; }</style>
    <script defer src="/scripts/labs-cookie-consent.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/count/main.tsx"></script>
  </body>
</html>
