<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-chords.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon-chords.svg" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Practice piano with MIDI controller support, exercises, and real-time feedback" />
    <title>Piano Practice - Tiff Zhang Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=optional">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Music&display=block">
    <script>
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            const script = document.createElement('script');
            script.async = true;
            script.src = '/scripts/analytics.js';
            document.head.appendChild(script);
        }
    </script>
    <link rel="stylesheet" href="/styles/shared.css" />
    <script>
      if ('fonts' in document) {
        let materialIconsLoaded = false;
        let notoMusicLoaded = false;
        function checkAllFontsLoaded() {
          if (materialIconsLoaded && notoMusicLoaded) document.documentElement.classList.add('fonts-loaded');
        }
        document.fonts.load('24px "Material Symbols Outlined"').then(() => {
          materialIconsLoaded = true;
          checkAllFontsLoaded();
        }).catch(() => {
          materialIconsLoaded = true;
          checkAllFontsLoaded();
        });
        document.fonts.load('24px "Noto Music"').then(() => {
          notoMusicLoaded = true;
          checkAllFontsLoaded();
        }).catch(() => {
          notoMusicLoaded = true;
          checkAllFontsLoaded();
        });
        setTimeout(() => document.documentElement.classList.add('fonts-loaded'), 3000);
      } else {
        window.addEventListener('load', () => document.documentElement.classList.add('fonts-loaded'));
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/piano/main.tsx"></script>
  </body>
</html>
