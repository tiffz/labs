name: Weekly engineering health

on:
  schedule:
    # Monday 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  ci-success-rate:
    name: CI success rate gate (>90%)
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Report CI health (fail below 90%)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci-health-report.mjs --days 7 --fail-below 90

  nightly-smoke:
    name: Nightly smoke (cold browser)
    runs-on: ubuntu-latest
    needs: ci-success-rate
    if: github.event_name == 'workflow_dispatch'
    env:
      CI: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke
