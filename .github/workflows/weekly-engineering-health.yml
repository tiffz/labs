name: Weekly engineering health

on:
  schedule:
    # Monday 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  ci-success-rate:
    name: CI success rate report (target >90%)
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Report CI health (advisory gate)
        id: ci_health
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci-health-report.mjs --days 7 --fail-below 90

      - name: Warn when below target
        if: steps.ci_health.outcome == 'failure'
        run: |
          echo "::warning title=CI success rate below 90%::Weekly advisory gate — triage with npm run report:ci-health and docs/ENGINEERING_HEALTH.md"

  dependency-audit:
    name: npm audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit production dependencies
        id: audit
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Warn on high/critical advisories
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::warning title=npm audit found high/critical advisories::Review with 'npm audit --omit=dev'. Upgrade via docs/DEPENDENCY_UPGRADE_PLAN.md."

  nightly-smoke:
    name: Nightly smoke (cold browser)
    runs-on: ubuntu-latest
    needs: ci-success-rate
    if: github.event_name == 'workflow_dispatch'
    env:
      CI: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke
