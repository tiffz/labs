name: Weekly engineering health

on:
  schedule:
    # Monday 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  ci-success-rate:
    name: CI success rate report (target >90%)
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Report CI health (advisory gate)
        id: ci_health
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci-health-report.mjs --days 7 --fail-below 90

      - name: Warn when below target
        if: steps.ci_health.outcome == 'failure'
        run: |
          echo "::warning title=CI success rate below 90%::Weekly advisory gate — triage with npm run report:ci-health and docs/ENGINEERING_HEALTH.md"

  dependency-audit:
    name: npm audit (security fast lane)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Audit production dependencies
        id: audit
        continue-on-error: true
        run: |
          npm audit --omit=dev --audit-level=high 2>&1 | tee audit-output.txt

      - name: File security issue on high/critical advisories
        if: steps.audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label security-audit --state open --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "npm audit: high/critical advisories in production deps" \
              --label security-audit \
              --body "$(printf 'Weekly security fast lane found high/critical advisories.\n\nTriage: `npm audit --omit=dev` locally, patch in-range with `npm audit fix`, majors via docs/DEPENDENCY_UPGRADE_PLAN.md.\n\n```\n%s\n```' "$(tail -c 4000 audit-output.txt)")"
          else
            echo "Open security-audit issue already exists; skipping duplicate."
          fi

      - name: Fail the job so the advisory is visible
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error title=npm audit found high/critical advisories::See the filed security-audit issue. Patch via npm audit fix or docs/DEPENDENCY_UPGRADE_PLAN.md."
          exit 1

  nightly-smoke:
    name: Nightly smoke (cold browser)
    runs-on: ubuntu-latest
    needs: ci-success-rate
    if: github.event_name == 'workflow_dispatch'
    env:
      CI: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke
