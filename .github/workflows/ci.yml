name: CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx' 
      - '**.js'
      - '**.jsx'
      - '**.json'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js' 
      - '**.jsx'
      - '**.json'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      CI: true
      NODE_ENV: test
      HUSKY: 0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need history to detect file changes
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # Temporarily disable cache to rule out cache issues
        # cache: 'npm'
        
    - name: Verify environment
      run: |
        node --version
        npm --version

    - name: Check for beat file changes
      id: beat-changes
      run: |
        # For PRs, compare against base branch; for pushes, compare against previous commit
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        
        if git diff --name-only "$BASE_REF" HEAD 2>/dev/null | grep -q '^src/beat/'; then
          echo "beat_changed=true" >> $GITHUB_OUTPUT
          echo "Beat files changed - will run full benchmarks"
        else
          echo "beat_changed=false" >> $GITHUB_OUTPUT
          echo "No beat file changes - will skip benchmarks"
        fi

    - name: Install dependencies
      run: |
        # Apply Rollup fix for Linux binary dependencies
        rm -rf node_modules package-lock.json
        npm install
        npm ci

    - name: Enforce shared-layer import boundaries
      run: npm run check:import-boundaries

    - name: Generate shared catalog
      run: npm run generate:shared-catalog
      
    - name: Run linter
      run: npm run lint

    - name: Run app typecheck
      run: npm run typecheck

    - name: Check for dead code
      run: npm run knip
      
    - name: Run tests
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ steps.beat-changes.outputs.beat_changed }}
      run: npm test

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run e2e smoke tests
      run: npm run test:e2e:smoke

    - name: Run audio regression hashes
      run: npm run test:audio:regression

    # Experimental: still runs on every CI for signal + Playwright artifacts, but does not fail the job.
    # Agents should run `npm run test:e2e:visual` (or update baselines locally) when touching UI/fonts.
    - name: Run visual regression screenshots (non-blocking)
      continue-on-error: true
      run: npm run test:e2e:visual

    - name: Upload visual regression artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-artifacts
        if-no-files-found: ignore
        path: |
          playwright-report/**
          test-results/**

    - name: Upload audio regression report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audio-regression-report
        if-no-files-found: ignore
        path: |
          src/beat/regression/reports/**

    - name: Build project
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        # Apply Rollup fix for Linux binary dependencies
        rm -rf node_modules package-lock.json
        npm install
        npm ci
        
    - name: Build project
      run: npm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 