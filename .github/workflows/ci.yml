name: CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'
      - 'workers/**'
      - 'CNAME'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'
      - 'workers/**'
      - 'CNAME'
      - 'LICENSE'

# Cancel superseded runs on the same branch (saves CI minutes; check latest run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  # Detect diff scope once; downstream jobs consume outputs.
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      beat_changed: ${{ steps.beat-changes.outputs.beat_changed }}
      e2e_mode: ${{ steps.e2e-scope.outputs.mode }}
      vitest_mode: ${{ steps.vitest-scope.outputs.mode }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Need history to detect file changes

    - name: Check for shared tempo analysis file changes
      id: beat-changes
      run: |
        # For PRs, compare against base branch; for pushes, compare against previous commit
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi

        if git diff --name-only "$BASE_REF" HEAD 2>/dev/null | grep -q '^src/shared/beat/'; then
          echo "beat_changed=true" >> $GITHUB_OUTPUT
          echo "Shared tempo analysis files changed - will run full benchmarks"
        else
          echo "beat_changed=false" >> $GITHUB_OUTPUT
          echo "No shared tempo analysis file changes - will skip benchmarks"
        fi

    - name: Detect e2e smoke scope
      id: e2e-scope
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        CHANGED="$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || true)"
        # src/types/ holds shared type defs — treat as cross-cutting, not an app.
        if echo "$CHANGED" | grep -qE '^(src/shared/|src/types/|e2e/|vite\.config|playwright\.config|package|\.github/workflows/)'; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "Cross-cutting changes — full e2e smoke"
        elif [ -z "$CHANGED" ]; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "No diff — full e2e smoke"
        else
          APP_COUNT="$(echo "$CHANGED" | grep -E '^src/[^/]+/' | cut -d/ -f2 | sort -u | wc -l | tr -d ' ')"
          if [ "$APP_COUNT" -le 3 ] && [ "$APP_COUNT" -gt 0 ]; then
            echo "mode=scoped" >> $GITHUB_OUTPUT
            echo "Single-app diff — scoped e2e via run-scoped-e2e.mjs"
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Multi-app or non-app diff — full e2e smoke"
          fi
        fi

    - name: Detect vitest scope
      id: vitest-scope
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        CHANGED="$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || true)"
        if echo "$CHANGED" | grep -qE '^(src/shared/|src/types/|vite\.config|vitest\.config|package|\.github/workflows/)'; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "Cross-cutting changes — full Vitest"
        elif [ -z "$CHANGED" ]; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "No diff — full Vitest"
        else
          APP_COUNT="$(echo "$CHANGED" | grep -E '^src/[^/]+/' | cut -d/ -f2 | sort -u | wc -l | tr -d ' ')"
          if [ "$APP_COUNT" -le 3 ] && [ "$APP_COUNT" -gt 0 ]; then
            echo "mode=scoped" >> $GITHUB_OUTPUT
            echo "Narrow app diff — scoped Vitest via run-changed-app-tests.mjs"
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Multi-app or non-app diff — full Vitest"
          fi
        fi

  # Static gates: guardrail contracts, lint, typecheck, knip.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      HUSKY: 0
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Enforce shared-layer import boundaries
      run: npm run check:import-boundaries

    - name: Validate agent docs and skills
      run: npm run check:agent-docs

    - name: Doc link hygiene
      run: npm run check:doc-links

    - name: UI copy baseline
      run: npm run check:ui-copy

    - name: CSS important baseline
      run: npm run check:css-important

    - name: CSS import order
      run: npm run check:css-import-order

    - name: Workflow guardrails (single Pages deploy)
      run: npm run check:workflows

    - name: Knip ignore config comments
      run: npm run check:knip-config

    - name: Generate shared catalog
      run: npm run generate:shared-catalog

    - name: Check labs homepage catalog
      run: npm run check:labs-catalog

    - name: Chrome UI contract
      run: npm run check:chrome-ui

    - name: Menu a11y contract
      run: npm run check:menu-a11y

    - name: Volume slider contract
      run: npm run check:volume-slider

    - name: App quality contract
      run: npm run check:app-quality

    - name: Muscle public assets
      run: npm run muscle:validate-assets

    - name: Run linter
      run: npm run lint

    - name: Run app typecheck
      run: npm run typecheck

    - name: Check for dead code
      run: npm run knip

  vitest:
    needs: scope
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      HUSKY: 0
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Scoped Vitest diffs against merge base

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests (full)
      if: needs.scope.outputs.vitest_mode == 'full'
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ needs.scope.outputs.beat_changed }}
      # One retry in CI absorbs rare Vitest worker teardown flakes (BroadcastChannel).
      run: npm test -- --retry=1

    - name: Run tests (scoped)
      if: needs.scope.outputs.vitest_mode == 'scoped'
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ needs.scope.outputs.beat_changed }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          node scripts/run-changed-app-tests.mjs "origin/${{ github.base_ref }}" -- --retry=1
        else
          node scripts/run-changed-app-tests.mjs "${{ github.event.before }}" -- --retry=1
        fi

    - name: Upload audio regression report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: audio-regression-report
        if-no-files-found: ignore
        path: |
          src/shared/beat/regression/reports/**

  # Coverage runs nightly (nightly-portfolio-audit.yml) — not on every PR/main push.

  e2e:
    needs: scope
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: test
      HUSKY: 0
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Scoped e2e diffs against merge base

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Resolve Playwright version
      id: playwright-version
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      uses: actions/cache@v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run e2e smoke tests (full)
      if: needs.scope.outputs.e2e_mode == 'full'
      run: npm run test:e2e:smoke

    - name: Run e2e smoke tests (scoped)
      if: needs.scope.outputs.e2e_mode == 'scoped'
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          node scripts/run-scoped-e2e.mjs "origin/${{ github.base_ref }}"
        else
          node scripts/run-scoped-e2e.mjs "${{ github.event.before }}"
        fi

    - name: Run playback UI regression smokes
      if: needs.scope.outputs.e2e_mode == 'full'
      run: npx playwright test e2e/playback-ui-regressions.spec.ts

    # Audio regression hashes are already covered by Vitest
    # (src/shared/beat/regression/syntheticAudioGenerator.audio-regression.test.ts); no
    # separate re-run needed here.

    - name: Run visual regression screenshots (scoped, blocking)
      # Scoped diffs get BLOCKING visual regression for the changed apps' routes.
      # Unexpected diffs must be judged per docs/VISUAL_JUDGE_RUBRIC.md (skill
      # labs-visual-judge) — fix must-fix regressions, or import intentional
      # baselines from this run's artifacts before merge.
      if: needs.scope.outputs.e2e_mode == 'scoped'
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          npx tsx scripts/run-scoped-visual.mts "origin/${{ github.base_ref }}"
        else
          npx tsx scripts/run-scoped-visual.mts "${{ github.event.before }}"
        fi

    # Full-matrix advisory visual regression moved to nightly-portfolio-audit.yml
    # (it added ~4 min to every cross-cutting PR and was advisory-only here).
    # Scoped diffs keep the BLOCKING per-app visual step above; nightly stays
    # the canonical full-matrix visual signal.

    - name: Upload visual regression artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: visual-regression-artifacts
        if-no-files-found: ignore
        path: |
          playwright-report/**
          test-results/**

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      HUSKY: 0
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      env:
        VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
        VITE_LABS_DRIVE_TESTER_HASHES: ${{ secrets.VITE_LABS_DRIVE_TESTER_HASHES }}
        VITE_APP_ENV: production
      run: npm run build

    - name: Bundle size report (advisory)
      run: node scripts/bundle-size-report.mjs --skip-build
      continue-on-error: true

    - name: Upload production build artifact
      uses: actions/upload-artifact@v7
      with:
        name: production-dist
        path: dist/
        retention-days: 1

  deploy:
    needs: [checks, vitest, e2e, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: pages-deploy-${{ github.ref }}
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment_retry2.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Download production build artifact
      uses: actions/download-artifact@v8
      with:
        name: production-dist
        path: dist

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./dist

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      timeout-minutes: 10
      continue-on-error: true

    - name: Wait before Pages deploy retry (90s)
      if: steps.deployment.outcome == 'failure'
      run: sleep 90

    - name: Deploy to GitHub Pages (retry 1)
      id: deployment_retry
      if: steps.deployment.outcome == 'failure'
      uses: actions/deploy-pages@v5
      timeout-minutes: 10
      continue-on-error: true

    - name: Wait before Pages deploy retry (120s)
      if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
      run: sleep 120

    - name: Deploy to GitHub Pages (retry 2)
      id: deployment_retry2
      if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
      uses: actions/deploy-pages@v5
      timeout-minutes: 10

    - name: Require successful Pages deploy
      if: always()
      run: |
        if [ "${{ steps.deployment.outcome }}" = "success" ]; then exit 0; fi
        if [ "${{ steps.deployment_retry.outcome }}" = "success" ]; then exit 0; fi
        if [ "${{ steps.deployment_retry2.outcome }}" = "success" ]; then exit 0; fi
        echo "Pages deploy failed after retries"
        exit 1
