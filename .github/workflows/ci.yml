name: CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      CI: true
      NODE_ENV: test
      HUSKY: 0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Need history to detect file changes
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Verify environment
      run: |
        node --version
        npm --version

    - name: Check for beat file changes
      id: beat-changes
      run: |
        # For PRs, compare against base branch; for pushes, compare against previous commit
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        
        if git diff --name-only "$BASE_REF" HEAD 2>/dev/null | grep -q '^src/beat/'; then
          echo "beat_changed=true" >> $GITHUB_OUTPUT
          echo "Beat files changed - will run full benchmarks"
        else
          echo "beat_changed=false" >> $GITHUB_OUTPUT
          echo "No beat file changes - will skip benchmarks"
        fi

    - name: Install dependencies
      run: npm ci

    - name: Enforce shared-layer import boundaries
      run: npm run check:import-boundaries

    - name: Generate shared catalog
      run: npm run generate:shared-catalog
      
    - name: Run linter
      run: npm run lint

    - name: Run app typecheck
      run: npm run typecheck

    - name: Check for dead code
      run: npm run knip
      
    - name: Run tests
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ steps.beat-changes.outputs.beat_changed }}
      run: npm test

    # Coverage runs after the primary test pass so a crash here doesn't hide
    # test failures. Non-blocking for now (building the floor first); flip to
    # blocking once the thresholds in vite.config.ts are comfortable.
    - name: Collect test coverage
      if: always()
      continue-on-error: true
      run: npm run test:coverage

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: coverage-report
        if-no-files-found: ignore
        path: |
          coverage/**

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run e2e smoke tests
      run: npm run test:e2e:smoke

    # Audio regression hashes are already covered by `npm test` above
    # (src/beat/utils/syntheticAudioGenerator.audio-regression.test.ts); no
    # separate re-run needed here.

    - name: Run visual regression screenshots
      # Visual regressions are advisory, not blocking. Linux Playwright rendering
      # drifts on its own (fonts, anti-aliasing, catalog layout) and refreshing
      # baselines on every drift would gate unrelated PRs. Artifacts are still
      # uploaded below so you can inspect diffs when intentionally changing UI.
      continue-on-error: true
      run: npm run test:e2e:visual

    - name: Upload visual regression artifacts
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: visual-regression-artifacts
        if-no-files-found: ignore
        path: |
          playwright-report/**
          test-results/**

    - name: Upload audio regression report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: audio-regression-report
        if-no-files-found: ignore
        path: |
          src/beat/regression/reports/**

    - name: Build project
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 