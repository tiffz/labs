name: CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx' 
      - '**.js'
      - '**.jsx'
      - '**.json'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js' 
      - '**.jsx'
      - '**.json'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      CI: true
      NODE_ENV: test
      HUSKY: 0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need history to detect file changes
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # Temporarily disable cache to rule out cache issues
        # cache: 'npm'
        
    - name: Verify environment
      run: |
        node --version
        npm --version

    - name: Check for beat file changes
      id: beat-changes
      run: |
        # For PRs, compare against base branch; for pushes, compare against previous commit
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        
        if git diff --name-only "$BASE_REF" HEAD 2>/dev/null | grep -q '^src/beat/'; then
          echo "beat_changed=true" >> $GITHUB_OUTPUT
          echo "Beat files changed - will run full benchmarks"
        else
          echo "beat_changed=false" >> $GITHUB_OUTPUT
          echo "No beat file changes - will skip benchmarks"
        fi

    - name: Enforce shared-layer import boundaries
      run: |
        node -e "const fs=require('fs'); const path=require('path'); const root='src/shared'; const fileExt=/\.(ts|tsx)$/; const importPattern=/from\\s+['\"][^'\"]*(\\.{1,2}\\/)+((beat|chords|drums|piano|words)\\/)/; const violations=[]; const walk=(dir)=>{ for (const entry of fs.readdirSync(dir,{withFileTypes:true})) { const full=path.join(dir,entry.name); if (entry.isDirectory()) walk(full); else if (fileExt.test(entry.name)) { const text=fs.readFileSync(full,'utf8'); const lines=text.split(/\\r?\\n/); lines.forEach((line,idx)=>{ if(importPattern.test(line)) violations.push(full+':'+(idx+1)+': '+line.trim());}); } } }; walk(root); if (violations.length){ console.error('Shared layer may not import from app directories.\\n'+violations.join('\\n')); process.exit(1);} "
        
    - name: Install dependencies
      run: |
        # Apply Rollup fix for Linux binary dependencies
        rm -rf node_modules package-lock.json
        npm install
        npm ci

    - name: Verify shared catalog generation
      run: npm run check:shared-catalog
      
    - name: Run linter
      run: npm run lint
      
    - name: Check for dead code
      run: npm run knip
      
    - name: Run tests
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ steps.beat-changes.outputs.beat_changed }}
      run: npm test

    - name: Build project
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        # Apply Rollup fix for Linux binary dependencies
        rm -rf node_modules package-lock.json
        npm install
        npm ci
        
    - name: Build project
      run: npm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 