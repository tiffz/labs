name: CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'
      - 'workers/**'
      - 'CNAME'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - '**.md'
      - '**.html'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - 'public/**'
      - 'package*.json'
      - '.github/workflows/**'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - 'knip.config.*'
      - 'playwright.config.*'
      - 'workers/**'
      - 'CNAME'
      - 'LICENSE'

# Cancel superseded runs on the same branch (saves CI minutes; check latest run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      CI: true
      NODE_ENV: test
      HUSKY: 0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Need history to detect file changes
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Verify environment
      run: |
        node --version
        npm --version

    - name: Check for shared tempo analysis file changes
      id: beat-changes
      run: |
        # For PRs, compare against base branch; for pushes, compare against previous commit
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        
        if git diff --name-only "$BASE_REF" HEAD 2>/dev/null | grep -q '^src/shared/beat/'; then
          echo "beat_changed=true" >> $GITHUB_OUTPUT
          echo "Shared tempo analysis files changed - will run full benchmarks"
        else
          echo "beat_changed=false" >> $GITHUB_OUTPUT
          echo "No shared tempo analysis file changes - will skip benchmarks"
        fi

    - name: Detect e2e smoke scope
      id: e2e-scope
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        CHANGED="$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || true)"
        if echo "$CHANGED" | grep -qE '^(src/shared/|e2e/|vite\.config|playwright\.config|package|\.github/workflows/)'; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "Cross-cutting changes — full e2e smoke"
        elif [ -z "$CHANGED" ]; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "No diff — full e2e smoke"
        else
          APP_COUNT="$(echo "$CHANGED" | grep -E '^src/[^/]+/' | cut -d/ -f2 | sort -u | wc -l | tr -d ' ')"
          if [ "$APP_COUNT" -le 2 ] && [ "$APP_COUNT" -gt 0 ]; then
            echo "mode=scoped" >> $GITHUB_OUTPUT
            echo "Single-app diff — scoped e2e via run-scoped-e2e.mjs"
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Multi-app or non-app diff — full e2e smoke"
          fi
        fi

    - name: Install dependencies
      run: npm ci

    - name: Enforce shared-layer import boundaries
      run: npm run check:import-boundaries

    - name: Validate agent docs and skills
      run: npm run check:agent-docs

    - name: Doc link hygiene
      run: npm run check:doc-links

    - name: UI copy baseline (em dash)
      run: npm run check:ui-copy

    - name: CSS important baseline
      run: npm run check:css-important

    - name: Workflow guardrails (single Pages deploy)
      run: npm run check:workflows

    - name: Generate shared catalog
      run: npm run generate:shared-catalog

    - name: Check labs homepage catalog
      run: npm run check:labs-catalog

    - name: Run linter
      run: npm run lint

    - name: Run app typecheck
      run: npm run typecheck

    - name: Check for dead code
      run: npm run knip

    # E2e before Vitest so smoke failures surface in ~4–5 min (fail-fast).
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run e2e smoke tests (full)
      if: steps.e2e-scope.outputs.mode == 'full'
      run: npm run test:e2e:smoke

    - name: Run e2e smoke tests (scoped)
      if: steps.e2e-scope.outputs.mode == 'scoped'
      run: node scripts/run-scoped-e2e.mjs

    - name: Run playback UI regression smokes
      if: steps.e2e-scope.outputs.mode == 'full'
      run: npx playwright test e2e/playback-ui-regressions.spec.ts

    # Audio regression hashes are already covered by `npm test` above
    # (src/shared/beat/regression/syntheticAudioGenerator.audio-regression.test.ts); no
    # separate re-run needed here.

    - name: Run visual regression screenshots
      # Advisory, not merge-blocking. Linux Playwright rendering drifts on its own
      # (fonts, anti-aliasing, catalog layout). Only run on cross-cutting diffs —
      # scoped single-app PRs skip this (~3m) and avoid noisy snapshot failures
      # unrelated to the change. Failures emit a warning (not ##[error]) so the
      # job summary stays green while artifacts remain for intentional baseline review.
      if: steps.e2e-scope.outputs.mode == 'full'
      run: |
        set +e
        npm run test:e2e:visual
        code=$?
        if [ "$code" -ne 0 ]; then
          echo "::warning title=Visual regression (advisory)::Snapshot mismatches (exit $code). See visual-regression-artifacts. Update baselines intentionally per docs/REGRESSION_WORKFLOW.md"
        fi
        exit 0

    - name: Upload visual regression artifacts
      if: always() && steps.e2e-scope.outputs.mode == 'full'
      uses: actions/upload-artifact@v6
      with:
        name: visual-regression-artifacts
        if-no-files-found: ignore
        path: |
          playwright-report/**
          test-results/**

    - name: Upload audio regression report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: audio-regression-report
        if-no-files-found: ignore
        path: |
          src/shared/beat/regression/reports/**

    - name: Detect vitest scope
      id: vitest-scope
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="origin/${{ github.base_ref }}"
        else
          BASE_REF="${{ github.event.before }}"
        fi
        CHANGED="$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || true)"
        if echo "$CHANGED" | grep -qE '^(src/shared/|vite\.config|vitest\.config|package|\.github/workflows/)'; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "Cross-cutting changes — full Vitest"
        elif [ -z "$CHANGED" ]; then
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "No diff — full Vitest"
        else
          APP_COUNT="$(echo "$CHANGED" | grep -E '^src/[^/]+/' | cut -d/ -f2 | sort -u | wc -l | tr -d ' ')"
          if [ "$APP_COUNT" -le 3 ] && [ "$APP_COUNT" -gt 0 ]; then
            echo "mode=scoped" >> $GITHUB_OUTPUT
            echo "Narrow app diff — scoped Vitest via run-changed-app-tests.mjs"
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Multi-app or non-app diff — full Vitest"
          fi
        fi

    - name: Run tests (full)
      if: steps.vitest-scope.outputs.mode == 'full'
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ steps.beat-changes.outputs.beat_changed }}
      # One retry in CI absorbs rare Vitest worker teardown flakes (BroadcastChannel).
      run: npm test -- --retry=1

    - name: Run tests (scoped)
      if: steps.vitest-scope.outputs.mode == 'scoped'
      env:
        INCLUDE_BEAT_BENCHMARK: ${{ steps.beat-changes.outputs.beat_changed }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          node scripts/run-changed-app-tests.mjs "origin/${{ github.base_ref }}"
        else
          node scripts/run-changed-app-tests.mjs "${{ github.event.before }}"
        fi

  # Coverage runs nightly (nightly-flakiness.yml) — not on every PR/main push.

    - name: Build project
      env:
        VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
        VITE_LABS_DRIVE_TESTER_HASHES: ${{ secrets.VITE_LABS_DRIVE_TESTER_HASHES }}
        VITE_APP_ENV: production
      run: npm run build

    - name: Upload production build artifact
      uses: actions/upload-artifact@v6
      with:
        name: production-dist
        path: dist/
        retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: pages-deploy-${{ github.ref }}
      cancel-in-progress: true
    
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Download production build artifact
      uses: actions/download-artifact@v6
      with:
        name: production-dist
        path: dist

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./dist

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      timeout-minutes: 10
      continue-on-error: true

    - name: Wait for in-flight GitHub Pages deployment
      if: steps.deployment.outcome == 'failure'
      run: sleep 90

    - name: Deploy to GitHub Pages (retry)
      id: deployment_retry
      if: steps.deployment.outcome == 'failure'
      uses: actions/deploy-pages@v5
      timeout-minutes: 10

    - name: Require successful Pages deploy
      if: always()
      run: |
        if [ "${{ steps.deployment.outcome }}" = "success" ]; then exit 0; fi
        if [ "${{ steps.deployment_retry.outcome }}" = "success" ]; then exit 0; fi
        echo "Pages deploy failed after retry"
        exit 1