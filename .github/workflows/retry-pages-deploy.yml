name: Retry failed Pages deploy

# After a failed CI/CD deploy job (often Pages "in progress deployment" race),
# wait for the in-flight deployment to finish, then re-run failed jobs once.
# Primary prevention: single deploy path in ci.yml + pages-deploy concurrency.

on:
  workflow_run:
    workflows: [CI/CD]
    types: [completed]
    branches: [main, master]

concurrency:
  group: pages-deploy-retry-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  retry-failed-deploy:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Wait for in-flight GitHub Pages deployment
        run: sleep 90

      - name: Re-run failed deploy job (when test passed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          TEST_OK=$(gh run view "$RUN_ID" --json jobs --jq '[.jobs[] | select(.name=="test") | .conclusion][0]')
          DEPLOY_JOB=$(gh run view "$RUN_ID" --json jobs --jq '[.jobs[] | select(.name=="deploy") | .databaseId][0]')
          DEPLOY_OK=$(gh run view "$RUN_ID" --json jobs --jq '[.jobs[] | select(.name=="deploy") | .conclusion][0]')
          if [ "$TEST_OK" = "success" ] && [ "$DEPLOY_OK" = "failure" ] && [ -n "$DEPLOY_JOB" ]; then
            gh run rerun "$RUN_ID" --job="$DEPLOY_JOB"
          else
            echo "Skip retry: test=$TEST_OK deploy=$DEPLOY_OK (only auto-retry deploy-after-green-test)"
          fi
