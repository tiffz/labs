name: Dependabot auto-merge

# Arms GitHub auto-merge on Dependabot minor/patch PRs. Branch protection on
# main requires checks/build/vitest/e2e, so the merge only happens after full
# CI passes. Majors are excluded by dependabot.yml (they follow
# docs/DEPENDENCY_UPGRADE_PLAN.md).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Arm auto-merge for minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
