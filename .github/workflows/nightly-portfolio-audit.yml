name: Nightly Portfolio Audit

# Cold-runner portfolio checks — not on PR CI (too slow).
# - Vitest fast suite + coverage (flake detector, no retries)
# - Playwright smoke + full visual matrix (Linux canonical baselines)
# - Lighthouse production audit (advisory — warnings only)
#
# Formerly "Nightly Flakiness Detector".

on:
  schedule:
    # 08:15 UTC = 01:15 PT / 04:15 ET — after main CI traffic tapers off.
    - cron: '15 8 * * *'
  workflow_dispatch:

jobs:
  vitest-cold:
    name: Vitest (cold cache + coverage)
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: test
      HUSKY: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js (no npm cache)
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Generate shared catalog
        run: npm run generate:shared-catalog

      - name: Check labs homepage catalog
        run: npm run check:labs-catalog

      - name: Run fast test suite (no retries)
        run: npm run test:fast -- --retry=0

      - name: Collect test coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          if-no-files-found: ignore
          path: |
            coverage/**

  playwright-cold:
    name: Playwright (smoke + visual)
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js (no npm cache)
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (fresh)
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke
        run: npm run test:e2e:smoke

      - name: Run soak specs (excluded from PR CI)
        run: npm run test:e2e:soak

      - name: Run visual regression baselines
        run: npm run test:e2e:visual

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-nightly-report
          if-no-files-found: ignore
          path: |
            playwright-report/**
            test-results/**

  lighthouse-portfolio:
    name: Lighthouse (production, per-app floors)
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js (no npm cache)
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Lighthouse
        run: npx playwright install --with-deps chromium

      - name: Production Lighthouse portfolio audit (per-app floors)
        id: lighthouse
        run: npm run audit:lighthouse -- --smoke-all --production --fail

      - name: Explain Lighthouse floor failures
        if: failure() && steps.lighthouse.outcome == 'failure'
        run: |
          echo "::error title=Lighthouse floors::One or more routes fell below their per-app floor (baseline − 5) — see docs/PERFORMANCE_BUDGETS.md and docs/LIGHTHOUSE_AUDIT.md"

      - name: Upload Lighthouse JSON reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-nightly-reports
          if-no-files-found: ignore
          path: |
            .cache/lighthouse-*.json

  duplication-ratchet:
    name: jscpd clone-count ratchet (advisory)
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js (no npm cache)
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Compare jscpd clone count against baseline (never fails)
        run: npm run check:jscpd-ratchet
