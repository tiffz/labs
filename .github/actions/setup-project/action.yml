name: 'Setup project'
description: 'Set up Node, restore a cached node_modules, and install only on a cache miss.'

# Every CI job used to run a full `npm ci` (~30-50s each) even though setup-node's
# `cache: npm` already caches the *download* tarballs. This caches the built
# `node_modules` directory keyed on the lockfile + Node version, so an unchanged
# lockfile (the common PR case) skips the install entirely. CI runners are always the
# same OS/arch, so the platform-specific binaries in node_modules stay valid.
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Restore node_modules
      id: cache-node-modules
      uses: actions/cache@v6
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', '.nvmrc') }}

    - name: Install dependencies
      # Cache miss (lockfile changed) → clean install. The setup-node npm cache keeps
      # this fast even on a miss. `npm ci` is deterministic from the lockfile.
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
