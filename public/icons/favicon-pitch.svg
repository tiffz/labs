<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Geometric mic; paper + ink tuned to Find Your Pitch shell (higher contrast for 16px) -->
  <defs>
    <linearGradient id="pitch-paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f7" />
      <stop offset="45%" stop-color="#fdf4ff" />
      <stop offset="100%" stop-color="#cffafe" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#pitch-paper)" />
  <rect
    x="1"
    y="1"
    width="30"
    height="30"
    rx="6"
    fill="none"
    stroke="#0f766e"
    stroke-width="2"
  />
  <!-- Darker teal ink than the frame so the mic reads clearly on the paper wash -->
  <g fill="#115e59" stroke="#115e59" stroke-linecap="round">
    <rect x="13" y="7" width="6" height="11" rx="3" stroke="none" />
    <circle cx="16" cy="11" r="1.7" fill="#db2777" stroke="#ffffff" stroke-width="0.5" />
    <path d="M11,15 Q11,21 16,21 Q21,21 21,15" fill="none" stroke-width="2.15" />
    <line x1="16" y1="21" x2="16" y2="25" stroke-width="2.15" />
    <line x1="13" y1="25" x2="19" y2="25" stroke-width="2.15" />
  </g>
</svg>
