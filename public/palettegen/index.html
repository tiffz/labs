<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette Generator moved</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://labs.tiffzhang.com/palette/" />
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fafafa;
        color: #1e293b;
      }
      main {
        max-width: 28rem;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.5;
        color: #64748b;
      }
      a {
        color: #7c3aed;
        font-weight: 600;
      }
    </style>
    <script>
      (function redirectToPalette() {
        var target = new URL('/palette/', window.location.origin);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Palette Generator has a new URL</h1>
      <p>Bookmark <a href="/palette/">/palette/</a> — shared palette links still work.</p>
      <p><a href="/palette/">Continue to Palette Generator</a></p>
    </main>
  </body>
</html>
