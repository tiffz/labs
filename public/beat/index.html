<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find the Beat moved to Stanza</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://labs.tiffzhang.com/stanza/" />
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3ebe2;
        color: #2a2622;
      }
      main {
        max-width: 28rem;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.5;
        color: #6d665e;
      }
      a {
        color: #c4307a;
        font-weight: 600;
      }
    </style>
    <script>
      (function redirectToStanza() {
        var target = new URL('/stanza/', window.location.origin);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Find the Beat is now Stanza</h1>
      <p>Your Beat library imports automatically the first time you open Stanza on this device.</p>
      <p><a href="/stanza/">Continue to Stanza</a></p>
    </main>
  </body>
</html>
